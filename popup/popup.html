<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RenameTab</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <img src="../assets/icon32.png" alt="" width="32" height="32">
        <div>
          <h1>RenameTab</h1>
          <p id="tab-title">当前标签页</p>
        </div>
      </header>

      <form id="rename-form">
        <label for="title">新 title</label>
        <input id="title" type="text" autocomplete="off" spellcheck="false" placeholder="输入新的标签页标题">

        <label for="strategy">生效范围</label>
        <select id="strategy">
          <option value="same_url">更改 URL 后恢复默认 title</option>
          <option value="tab_lifetime">关闭标签页后恢复默认 title</option>
          <option value="until_refresh">刷新后恢复默认 title</option>
        </select>

        <button id="submit" type="submit">提交</button>
      </form>

      <footer>
        <button id="open-renamer" type="button">在页面中输入</button>
        <button id="shortcuts" type="button">快捷键设置</button>
        <span id="status" role="status"></span>
      </footer>
    </main>
    <script src="../src/policy.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
